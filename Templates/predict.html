{% extends 'base.html' %}

{% block title %}Loan Eligibility{% endblock %}

{% block content %}

<div class="container py-5">

    <div class="card shadow-lg border-0">

        <div class="card-header bg-primary text-white text-center py-4">

            <h2 class="mb-1">
                <i class="bi bi-bank"></i>
                Loan Eligibility Prediction
            </h2>

            <p class="mb-0">
                Complete the form below to receive an AI-powered prediction.
            </p>

        </div>

        <div class="card-body p-5">

            <form method="POST">

                {% csrf_token %}

                <!-- Personal Information -->

                <h4 class="text-primary mb-4">

                    <i class="bi bi-person-circle"></i>

                    Personal Information

                </h4>

                <div class="row">

                    <div class="col-md-4 mb-4">

                        <label class="form-label">Gender</label>

                        <select name="gender" class="form-select">

                            <option>Male</option>

                            <option>Female</option>

                        </select>

                    </div>

                    <div class="col-md-4 mb-4">

                        <label class="form-label">Marital Status</label>

                        <select name="married" class="form-select">

                            <option>Yes</option>

                            <option>No</option>

                        </select>

                    </div>

                    <div class="col-md-4 mb-4">

                        <label class="form-label">Dependents</label>

                        <select name="dependents" class="form-select">

                            <option>0</option>

                            <option>1</option>

                            <option>2</option>

                            <option>3+</option>

                        </select>

                    </div>

                </div>

                <div class="row">

                    <div class="col-md-6 mb-4">

                        <label class="form-label">Education</label>

                        <select name="education" class="form-select">

                            <option>Graduate</option>

                            <option>Not Graduate</option>

                        </select>

                    </div>

                    <div class="col-md-6 mb-4">

                        <label class="form-label">Self Employed</label>

                        <select name="self_employed" class="form-select">

                            <option>No</option>

                            <option>Yes</option>

                        </select>

                    </div>

                </div>

                <hr class="my-5">

                <!-- Financial Information -->

                <h4 class="text-success mb-4">

                    <i class="bi bi-cash-stack"></i>

                    Financial Information

                </h4>

                <div class="row">

                    <div class="col-md-6 mb-4">

                        <label class="form-label">

                            Monthly Applicant Income (₹)

                        </label>

                        <input
                            type="number"
                            name="applicant_income"
                            class="form-control"
                            placeholder="50000"
                            min="0"
                            required>

                    </div>

                    <div class="col-md-6 mb-4">

                        <label class="form-label">

                            Monthly Co-Applicant Income (₹)

                        </label>

                        <input
                            type="number"
                            name="coapplicant_income"
                            class="form-control"
                            placeholder="15000"
                            min="0"
                            required>

                    </div>

                </div>

                <div class="row">

                    <div class="col-md-6 mb-4">

                        <label class="form-label">

                            Loan Amount (₹ Thousands)

                        </label>

                        <input
                            type="number"
                            name="loan_amount"
                            class="form-control"
                            placeholder="120"
                            min="10"
                            max="700"
                            required>

                    </div>

                    <div class="col-md-6 mb-4">

                        <label class="form-label">

                            Loan Tenure (Months)

                        </label>

                        <select
                            name="loan_amount_term"
                            class="form-select">

                            <option value="360">360</option>
                            <option value="240">240</option>
                            <option value="180">180</option>
                            <option value="120">120</option>
                            <option value="60">60</option>

                        </select>

                    </div>

                </div>

                <div class="row">

                    <div class="col-md-6 mb-4">

                        <label class="form-label">

                            Credit History

                        </label>

                        <select
                            name="credit_history"
                            class="form-select">

                            <option>Good</option>

                            <option>Bad</option>

                        </select>

                    </div>

                    <div class="col-md-6 mb-4">

                        <label class="form-label">

                            Property Area

                        </label>

                        <select
                            name="property_area"
                            class="form-select">

                            <option>Urban</option>

                            <option>Semiurban</option>

                            <option>Rural</option>

                        </select>

                    </div>

                </div>

                <div class="text-center mt-5">

                    <button
                        class="btn btn-success btn-lg px-5">

                        <i class="bi bi-graph-up-arrow"></i>

                        Predict Eligibility

                    </button>

                </div>

            </form>

        </div>

    </div>

</div>

{% endblock %}
